<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión · Portafolio Base de Datos II</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul-oscuro: #0a0e1a;
      --azul-navy: #0d1b2e;
      --azul-medio: #112240;
      --cian: #00e5ff;
      --blanco: #ffffff;
      --gris: #a0b4c8;
      --error: #ff4d6d;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--azul-oscuro);
      color: var(--blanco);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      display: flex; align-items: center; justify-content: space-between;
      background-color: var(--azul-navy); padding: 12px 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.7);
      position: sticky; top: 0; z-index: 100; gap: 15px;
    }
    .logo-area { display: flex; align-items: center; gap: 15px; }
    header img.logo { width: 110px; height: 55px; object-fit: cover; border-radius: 8px; }
    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9em, 2.5vw, 1.5em);
      color: var(--cian); letter-spacing: 2px; text-transform: uppercase;
      text-shadow: 0 0 18px rgba(0,229,255,0.6);
    }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 8px;
    }
    .hamburger span { display: block; width: 26px; height: 2px; background: var(--cian); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-menu {
      display: flex; gap: 8px; background: rgba(0,0,0,0.3);
      padding: 6px 16px; border-radius: 50px; backdrop-filter: blur(4px);
    }
    .nav-menu a {
      text-decoration: none; color: var(--blanco); font-weight: 600;
      padding: 7px 15px; border-radius: 40px; transition: all 0.3s;
      font-size: clamp(0.75em, 1.5vw, 0.9em); white-space: nowrap; border: 1px solid transparent;
    }
    .nav-menu a:hover, .nav-menu a.active {
      background: var(--cian); color: var(--azul-navy);
      border-color: var(--cian); box-shadow: 0 0 12px rgba(0,229,255,0.5);
    }

    /* ===== LOGIN LAYOUT ===== */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 79px);
      padding: clamp(20px, 5vw, 50px) 15px;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      animation: fadeUp 0.7s ease;
    }

    /* Logo central */
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo img {
      width: clamp(80px, 20vw, 120px);
      height: auto;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .login-logo h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.3em, 4vw, 1.9em);
      color: var(--cian);
      text-shadow: 0 0 20px rgba(0,229,255,0.4);
      margin-bottom: 4px;
    }
    .login-logo p { color: var(--gris); font-size: clamp(0.82em, 2vw, 0.95em); }

    /* Tarjeta del formulario */
    .login-card {
      background: rgba(13,27,46,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,229,255,0.25);
      border-radius: 24px;
      padding: clamp(25px, 6vw, 45px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .form-grupo {
      margin-bottom: 22px;
    }
    .form-grupo label {
      display: block;
      color: var(--gris);
      font-size: clamp(0.78em, 1.5vw, 0.88em);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper .icono {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1em;
      pointer-events: none;
    }
    .form-grupo input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 12px;
      color: var(--blanco);
      font-size: clamp(0.88em, 2vw, 1em);
      font-family: 'Lato', sans-serif;
      outline: none;
      transition: all 0.3s;
    }
    .form-grupo input:focus {
      border-color: var(--cian);
      background: rgba(0,229,255,0.05);
      box-shadow: 0 0 15px rgba(0,229,255,0.15);
    }
    .form-grupo input::placeholder { color: rgba(160,180,200,0.5); }

    /* Mostrar/ocultar contraseña */
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gris);
      font-size: 1em;
      padding: 4px;
      transition: color 0.3s;
    }
    .toggle-pass:hover { color: var(--cian); }

    /* Mensaje de error */
    .mensaje-error {
      display: none;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--error);
      font-size: 0.85em;
      margin-bottom: 18px;
      text-align: center;
    }
    .mensaje-error.visible { display: block; }

    /* Recordar / Olvidé */
    .form-extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--gris);
      font-size: clamp(0.78em, 1.5vw, 0.88em);
    }
    .checkbox-label input[type="checkbox"] { accent-color: var(--cian); width: 15px; height: 15px; }
    .link-olvide {
      color: var(--cian);
      font-size: clamp(0.78em, 1.5vw, 0.88em);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .link-olvide:hover { opacity: 0.7; }

    /* Botón de login */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--cian);
      color: var(--azul-navy);
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9em, 2vw, 1em);
      font-weight: 700;
      letter-spacing: 1.5px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }
    .btn-login:hover {
      background: #40f0ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,229,255,0.5);
    }
    .btn-login:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0; color: var(--gris); font-size: 0.82em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }

    /* Volver al inicio */
    .link-volver {
      display: block; text-align: center;
      color: var(--gris); font-size: clamp(0.8em, 1.5vw, 0.88em);
      text-decoration: none; transition: color 0.3s;
    }
    .link-volver:hover { color: var(--cian); }
    .link-volver span { color: var(--cian); }

    /* Footer */
    footer {
      background-color: var(--azul-navy);
      text-align: center;
      padding: 20px 15px;
      color: var(--cian);
      font-size: clamp(0.8em, 1.5vw, 1em);
      border-top: 1px solid rgba(0,229,255,0.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .hamburger { display: flex; }
      .nav-menu {
        display: none; position: absolute; top: 100%; left: 0; right: 0;
        background: var(--azul-navy); border-radius: 0 0 20px 20px;
        flex-direction: column; padding: 15px 20px; gap: 5px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        border-top: 1px solid rgba(0,229,255,0.2);
      }
      .nav-menu.open { display: flex; }
      .nav-menu a { text-align: center; padding: 10px; border-radius: 10px; }
      header { position: relative; }
    }

    @media (max-width: 480px) {
      header { padding: 10px 15px; }
      header img.logo { width: 80px; height: 40px; }
      .login-card { padding: 22px 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <img src="lgUpla.png" alt="Logo UPLA" class="logo">
    <h1>Mi Portafolio Académico</h1>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-menu" id="navMenu">
    <a href="index.html">Inicio</a>
    <a href="sobreMi.html">Sobre mí</a>
    <a href="unidades.html">Unidades</a>
    <a href="login.html" class="active">Iniciar Sesión</a>
  </nav>
</header>

<div class="login-wrapper">
  <div class="login-container">

    <div class="login-logo">
      <img src="lgUpla.png" alt="Logo UPLA">
      <h2>Bienvenido</h2>
      <p>Inicia sesión en tu portafolio académico</p>
    </div>

    <div class="login-card">
      <div class="mensaje-error" id="mensajeError">
        ❌ Usuario o contraseña incorrectos
      </div>

      <div class="form-grupo">
        <label for="usuario">Usuario</label>
        <div class="input-wrapper">
          <span class="icono">👤</span>
          <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="username">
        </div>
      </div>

      <div class="form-grupo">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="icono">🔒</span>
          <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
          <button class="toggle-pass" type="button" id="togglePass" aria-label="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <div class="form-extras">
        <label class="checkbox-label">
          <input type="checkbox" id="recordar">
          Recordarme
        </label>
        <a href="#" class="link-olvide">¿Olvidé mi contraseña?</a>
      </div>

      <button class="btn-login" id="btnLogin" onclick="iniciarSesion()">
        Iniciar Sesión
      </button>

      <div class="divider">o</div>

      <a href="index.html" class="link-volver">
        ← Volver al <span>Inicio</span>
      </a>
    </div>

  </div>
</div>

<footer>
  © 2026 Universidad Peruana Los Andes · Base de Datos II
</footer>

<script>
  // Hamburger
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('navMenu');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    navMenu.classList.toggle('open');
  });
  navMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('open');
      navMenu.classList.remove('open');
    });
  });

  // Mostrar / ocultar contraseña
  const togglePass = document.getElementById('togglePass');
  const passInput = document.getElementById('password');
  togglePass.addEventListener('click', () => {
    const tipo = passInput.type === 'password' ? 'text' : 'password';
    passInput.type = tipo;
    togglePass.textContent = tipo === 'password' ? '👁️' : '🙈';
  });

  // Login
  function iniciarSesion() {
    const usuario = document.getElementById('usuario').value.trim();
    const password = document.getElementById('password').value;
    const error = document.getElementById('mensajeError');

    // Demo: usuario "admin" contraseña "1234"
    if (usuario === 'admin' && password === '1234') {
      error.classList.remove('visible');
      alert('✅ ¡Bienvenido, Eduardo! Sesión iniciada correctamente.');
      // Aquí redirigir: window.location.href = 'dashboard.html';
    } else {
      error.classList.add('visible');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  // Enter para enviar
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion();
  });
</script>
</body>
</html>
